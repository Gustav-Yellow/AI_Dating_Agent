spring:
  application:
    name: ai-agent
  profiles:
    active: local
  datasource:
    url: jdbc:postgresql://rm-cn-fsw4oz1x60001z8o.rwlb.rds.aliyuncs.com/ai_dating_agent
    username: root_user
    password: Root123456@
  ai:
    vectorstore:
      pgvector:
        index-type: HNSW
        dimensions: 1536
        distance-type: COSINE_DISTANCE
        max-document-batch-size: 10000 # Optional: Maximum number of documents per batch
    mcp:
#      client:
#        stdio:
#          servers-configuration: classpath:mcp-servers.json
      client:
        sse:
          connections:
            server1:
              url: http://localhost:8127
server:
  port: 8123
  servlet:
    context-path: /api
# springdoc-openapi
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.ai.aiagent.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn